version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: yamboly-prod-db
    restart: always
    environment:
      POSTGRES_USER: yamboly
      POSTGRES_PASSWORD: yamboly123
      POSTGRES_DB: yamboly_db
    ports:
      - "5432:5432"
    volumes:
      - yamboly_prod_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yamboly -d yamboly_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yamboly_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: yamboly-prod-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://yamboly:yamboly123@db:5432/yamboly_db
      JWT_SECRET: yamboly_mvp_super_secret_2026
      CORS_ORIGIN: http://localhost:80
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - yamboly_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:80/api/v1
    container_name: yamboly-prod-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - yamboly_network

volumes:
  yamboly_prod_postgres_data:
    driver: local

networks:
  yamboly_network:
    driver: bridge
