version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yamboly
      POSTGRES_PASSWORD: yamboly123
      POSTGRES_DB: yamboly_db
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://yamboly:yamboly123@db:5432/yamboly_db
      JWT_SECRET: yamboly_mvp_super_secret_2026
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: